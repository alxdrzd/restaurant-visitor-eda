[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "restaurant_visitor_eda"
version = "0.0.1"
description = "exploratory data analysis for the restaurant visitors data set for epam mentoring task"
authors = [
  { name = "Alexandr Drozd" },
]
license = { file = "LICENSE" }
readme = "README.md"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License"
]
dependencies = [
    "ipython",
    "jupyterlab",
    "kaggle>=1.7.4.5",
    "loguru",
    "matplotlib",
    "mkdocs",
    "mkdocs-material>=9.7.6",
    "notebook",
    "numpy",
    "pandas",
    "pip",
    "python-dotenv",
    "ruff",
    "scikit-learn",
    "tqdm",
    "typer",
]
requires-python = "~=3.10.0"


[tool.ruff]
line-length = 99
src = ["restaurant_visitor_eda"]
include = ["pyproject.toml", "restaurant_visitor_eda/**/*.py"]

[tool.ruff.lint]
extend-select = ["I"]  # Add import sorting

[tool.ruff.lint.isort]
known-first-party = ["restaurant_visitor_eda"]
force-sort-within-sections = true

